name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Verify tag matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          CLI_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' stegoeggo-cli/Cargo.toml)
          echo "Tag:        $TAG_VERSION"
          echo "Package:    $PKG_VERSION"
          echo "CLI:        $CLI_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$PKG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag does not match Cargo.toml versions"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

      - name: Run doc tests
        run: cargo test --doc

      - name: Package dry-run
        run: cargo package --workspace --allow-dirty

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: License and advisory check
        run: |
          cargo deny check licenses
          cargo deny check advisories

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl libxml2-utils imagemagick libvips-tools

      - name: External integration tests
        run: cargo test --test external_tools -- --ignored

      - name: Build conformance harness
        run: cargo build --release --bin stegoeggo-conformance

      - name: Run conformance checks
        run: |
          ./target/release/stegoeggo-conformance \
            --fixtures tests/fixtures/conformance \
            --manifest tests/fixtures/conformance/manifest.toml \
            --strict \
            --json conformance-report.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: conformance-report.json

      - name: Write tool version manifest
        if: always()
        run: |
          {
            echo "exiftool $(exiftool -ver)"
            echo "xmllint $(xmllint --version 2>&1 | head -1)"
            echo "imagemagick $(convert --version 2>&1 | head -1)"
            echo "libvips $(vips --version 2>&1 | head -1)"
            echo "rustc $(rustc --version)"
            echo "cargo $(cargo --version)"
          } > tool-versions.txt

      - name: Upload tool versions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-tool-versions
          path: tool-versions.txt
