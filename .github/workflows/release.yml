name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Verify tag matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          CLI_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' stegoeggo-cli/Cargo.toml)
          echo "Tag:        $TAG_VERSION"
          echo "Package:    $PKG_VERSION"
          echo "CLI:        $CLI_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$PKG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag does not match Cargo.toml versions"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

      - name: Run doc tests
        run: cargo test --doc

      - name: Package dry-run
        run: cargo package --workspace --allow-dirty --no-verify

      - name: License check
        run: cargo deny check licenses
        continue-on-error: true

      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Build conformance harness
        run: cargo build --release --bin stegoeggo-conformance

      - name: Run conformance checks
        run: |
          ./target/release/stegoeggo-conformance \
            --fixtures tests/fixtures/conformance \
            --strict \
            --json conformance-report.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-conformance-report
          path: conformance-report.json