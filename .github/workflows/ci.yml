name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --all-features

  package:
    name: Package Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check package
        run: cargo package --workspace --allow-dirty

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --all-features
      
      - name: Run doc tests
        run: cargo test --doc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run audit
        run: cargo audit

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check advisories
        run: cargo deny check advisories

  external-integration:
    name: External Integration
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl libxml2-utils imagemagick libvips-tools

      - name: Run external integration tests
        run: cargo test --test external_tools -- --ignored

  conformance:
    name: External Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl libxml2-utils imagemagick libvips-tools

      - name: Log tool versions
        run: |
          echo "=== External Tool Versions ==="
          exiftool -ver
          xmllint --version 2>&1 | head -1
          convert --version 2>&1 | head -1
          vips --version 2>&1 | head -1
          rustc --version
          cargo --version

      - name: Write tool version manifest
        run: |
          {
            echo "exiftool $(exiftool -ver)"
            echo "xmllint $(xmllint --version 2>&1 | head -1)"
            echo "imagemagick $(convert --version 2>&1 | head -1)"
            echo "libvips $(vips --version 2>&1 | head -1)"
            echo "rustc $(rustc --version)"
            echo "cargo $(cargo --version)"
          } > tool-versions.txt

      - name: Build conformance harness
        run: cargo build --release --bin stegoeggo-conformance

      - name: Run conformance checks
        run: |
          ./target/release/stegoeggo-conformance \
            --fixtures tests/fixtures/conformance \
            --manifest tests/fixtures/conformance/manifest.toml \
            --strict \
            --json conformance-report.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: conformance-report.json

      - name: Upload tool versions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tool-versions
          path: tool-versions.txt

  features:
    name: Feature Matrix (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: ""
            name: no-default
          - features: "async"
            name: async
          - features: "signatures"
            name: signatures
          - features: "detached-manifest"
            name: detached-manifest
          - features: "async,signatures,detached-manifest"
            name: all-features
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check (${{ matrix.name }})
        run: cargo check --no-default-features --features "${{ matrix.features }}"

      - name: Test (${{ matrix.name }})
        run: cargo test --no-default-features --features "${{ matrix.features }}"

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Run benchmarks
        run: cargo bench
