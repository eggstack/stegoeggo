name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Before Publish
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.verify-tag.outputs.tag_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Verify tag matches Cargo.toml
        id: verify-tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          CLI_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' stegoeggo-cli/Cargo.toml)
          echo "Tag:        $TAG_VERSION"
          echo "Package:    $PKG_VERSION"
          echo "CLI:        $CLI_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$PKG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag does not match Cargo.toml versions"
            exit 1
          fi
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty — publication must be from clean commits"
            git status --porcelain
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

      - name: Run doc tests
        run: cargo test --doc

      - name: Package (strict, no --allow-dirty)
        run: cargo package --workspace

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: License and advisory check
        run: |
          cargo deny check licenses
          cargo deny check advisories

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl libxml2-utils imagemagick libvips-tools

      - name: External integration tests
        run: cargo test --test external_tools -- --ignored

      - name: Build conformance harness
        run: cargo build --release --bin stegoeggo-conformance

      - name: Run conformance checks
        run: |
          ./target/release/stegoeggo-conformance \
            --fixtures tests/fixtures/conformance \
            --manifest tests/fixtures/conformance/manifest.toml \
            --strict \
            --json conformance-report.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-conformance-report
          path: conformance-report.json

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Publish library crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish CLI crate
        run: cargo publish -p stegoeggo-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI binaries
        run: |
          TARGETS=(
            "x86_64-unknown-linux-gnu"
            "aarch64-unknown-linux-gnu"
            "x86_64-apple-darwin"
            "aarch64-apple-darwin"
            "x86_64-pc-windows-msvc"
          )
          for target in "${TARGETS[@]}"; do
            echo "Building for $target..."
            cargo build --release --bin stegoeggo-cli --target "$target" 2>/dev/null || echo "Skipping $target (cross-compile not available)"
          done

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          TAG_VERSION="${{ needs.validate.outputs.tag_version }}"
          for f in target/release/stegoeggo-cli; do
            if [ -f "$f" ]; then
              cp "$f" "release-artifacts/stegoeggo-${TAG_VERSION}-linux-amd64"
            fi
          done

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          for f in *; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.validate.outputs.tag_version }}
          generate_release_notes: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dependency inventory
        run: cargo tree --workspace --depth 1 > dependency-inventory.txt

      - name: Upload dependency inventory
        uses: actions/upload-artifact@v4
        with:
          name: dependency-inventory
          path: dependency-inventory.txt
