name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  verify-rc:
    name: Verify Release Candidate Exists
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.verify-tag.outputs.tag_version }}
      rc_sha: ${{ steps.find-rc.outputs.rc_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches Cargo.toml
        id: verify-tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          CLI_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' stegoeggo-cli/Cargo.toml)
          echo "Tag:        $TAG_VERSION"
          echo "Package:    $PKG_VERSION"
          echo "CLI:        $CLI_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$PKG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag does not match Cargo.toml versions"
            exit 1
          fi
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Find successful RC for this SHA
        id: find-rc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBLISH_SHA="${{ github.sha }}"
          echo "Looking for successful RC run for SHA: $PUBLISH_SHA"

          # Search for successful Release Candidate workflow runs
          RC_RUNS=$(gh run list \
            --workflow release-candidate.yml \
            --status completed \
            --limit 20 \
            --json databaseId,conclusion,headSha \
            --jq ".[] | select(.conclusion == \"success\" and .headSha == \"$PUBLISH_SHA\") | .databaseId")

          if [ -z "$RC_RUNS" ]; then
            echo "::error::No successful release-candidate run found for SHA $PUBLISH_SHA"
            echo "Run the Release Candidate workflow for this SHA before publishing."
            exit 1
          fi

          RC_RUN_ID=$(echo "$RC_RUNS" | head -1)
          echo "Found successful RC run: #$RC_RUN_ID"
          echo "rc_sha=$PUBLISH_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty — publication must be from clean commits"
            git status --porcelain
            exit 1
          fi

  validate:
    name: Validate Before Publish
    needs: verify-rc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (at validated SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-rc.outputs.rc_sha }}

      - name: Verify checkout matches RC SHA
        run: |
          CHECKOUT_SHA=$(git rev-parse HEAD)
          EXPECTED="${{ needs.verify-rc.outputs.rc_sha }}"
          echo "Checkout SHA:  $CHECKOUT_SHA"
          echo "Expected SHA:  $EXPECTED"
          if [ "$CHECKOUT_SHA" != "$EXPECTED" ]; then
            echo "::error::Checkout SHA does not match the validated RC SHA"
            exit 1
          fi

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --no-fail-fast

      - name: Run doc tests
        run: cargo test --doc

      - name: Package (strict, no --allow-dirty)
        run: cargo package --workspace

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: License and advisory check
        run: |
          cargo deny check licenses
          cargo deny check advisories

      - name: Install external tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl libxml2-utils imagemagick libvips-tools

      - name: External integration tests
        run: cargo test --test external_tools -- --ignored

      - name: Build conformance harness
        run: cargo build --release --bin stegoeggo-conformance

      - name: Run conformance checks
        run: |
          ./target/release/stegoeggo-conformance \
            --fixtures tests/fixtures/conformance \
            --manifest tests/fixtures/conformance/manifest.toml \
            --strict \
            --json conformance-report.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-conformance-report
          path: conformance-report.json

  publish:
    name: Publish to crates.io
    needs: [verify-rc, validate]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Checkout (at validated SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-rc.outputs.rc_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Publish library crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish CLI crate
        run: cargo publish -p stegoeggo-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [verify-rc, validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (at validated SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-rc.outputs.rc_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI binary
        run: cargo build --release --bin stegoeggo

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          TAG_VERSION="${{ needs.verify-rc.outputs.tag_version }}"
          if [ -f target/release/stegoeggo ]; then
            cp target/release/stegoeggo "release-artifacts/stegoeggo-${TAG_VERSION}-linux-amd64"
          fi

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          for f in *; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.verify-rc.outputs.tag_version }}
          generate_release_notes: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dependency inventory
        run: cargo tree --workspace --depth 1 > dependency-inventory.txt

      - name: Upload dependency inventory
        uses: actions/upload-artifact@v4
        with:
          name: dependency-inventory
          path: dependency-inventory.txt
