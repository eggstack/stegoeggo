[package]
name = "cloakrs"
version = "0.2.0"
edition = "2021"
rust-version = "1.87"
description = "Image protection through steganographic watermarking and metadata injection for legal deterrence"
authors = ["David Bowman <dbowman91@proton.me>"]
license = "MIT"
repository = "https://github.com/anomalyco/cloakrs"
homepage = "https://github.com/anomalyco/cloakrs"
documentation = "https://docs.rs/cloakrs"
readme = "README.md"
keywords = ["image", "steganography", "anti-scraping", "ai-safety", "watermark"]
categories = ["graphics", "multimedia::images"]

[features]
default = []
async = ["tokio"]

[dependencies]
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
jpeg-encoder = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
digest = "0.10"
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
base58 = "0.2"
crc32fast = "1.4"
rayon = "1.10"
subtle = "2"
tokio = { version = "1", features = ["rt-multi-thread"], optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tokio = { version = "1", features = ["macros"] }

[[test]]
name = "async_integration"
path = "tests/async_integration.rs"
required-features = ["async"]

[[bench]]
name = "bench"
harness = false
